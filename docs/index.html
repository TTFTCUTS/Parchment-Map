<!DOCTYPE html>


<html lang="en-GB">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="rootdepth" content="0">

        <title>Parchment Map</title>

        <link rel="stylesheet" href="styles.css">

        <script defer src="main.dart.js" type="application/javascript"></script>
    </head>

    <body>
        <div id="topbar">
            <input type="file" id="imageInput" accept="image/*" disabled autocomplete="off">
            <label>
                Seed
                <input type="number" id="seedInput" value="0" required disabled autocomplete="off">
            </label>
            <input type="button" id="renderButton" value="Render" disabled autocomplete="off">
            <span id="legendOpen">Input Colour Legend</span>
        </div>
        <div id="main">
            <canvas id="canvas" width="100" height="100"></canvas>
        </div>
        <div id="legend">
            <div id="legendClose">×</div>
            <h2>Terrain Types</h2>
            <p>To make input images, use these colours to define different terrain regions. Make sure you aren't using any anti-alias, the specific colours matter.</p>
            <div id="legendItems"></div>
        </div>
    </body>
</html>
